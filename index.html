<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Noise | Industrial Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">MORITZ <span>BARZ</span></a>
            <button class="hamburger" id="hamburger">
                <span class="bar"></span><span class="bar"></span><span class="bar"></span>
            </button>
            <ul class="nav-links" id="nav-links">
                <li><a href="#work">Work</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>HEAVY DESIGN. DEEP IMPACT.</h1>
            <p>Vom Moshpit in die Tiefe: Kompromissloses Design für die Heavy Metal Szene und darüber hinaus</p>
        </div>
    </header>

    <section id="work" class="section">
        <div class="container">
            <div class="filter-controls">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="branding">Branding</button>
                <button class="filter-btn" data-filter="3d-print">3D-Printing</button>
            </div>
            <div class="gallery-grid" id="gallery"></div>
        </div>
    </section>

    <section id="about" class="section bg-alt">
        <div class="container narrow">
            <h2 class="section-title">The Craftsman</h2>
            <p>Kombination aus roher Metal-Ästhetik und technischer Präzision.</p>
        </div>
    </section>

    <section id="contact" class="section">
        <div class="container narrow">
            <h2 class="section-title">Contact</h2>
            <form class="contact-form">
                <input type="text" placeholder="Name" required>
                <input type="email" placeholder="Email" required>
                <textarea rows="5" placeholder="Message" required></textarea>
                <button type="submit" class="btn">Send Transmission</button>
            </form>
        </div>
    </section>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
